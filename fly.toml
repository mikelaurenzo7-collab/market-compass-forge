app = 'market-compass-forge'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'
  target = 'api'

[env]
  NODE_ENV = 'production'
  DATABASE_PATH = '/data/beastbot.db'
  FRONTEND_URL = 'https://market-compass-forge.fly.dev'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[mounts]
  source = 'beastbots_data'
  destination = '/data'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
