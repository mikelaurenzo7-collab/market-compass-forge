version: "3.9"

services:
  api:
    build:
      context: .
      target: api
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /data/beastbot.db
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  web:
    build:
      context: .
      target: web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Keep browser calls same-origin (/api/*) and proxy internally to API service.
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db-data:
