name = "beastbots"
main = "packages/workers/src/worker-entry.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# ─── Durable Objects ──────────────────────────────────────────
# Single unified DO class handles all bot families (trading, store, social, workforce).
# Each tenant+bot pair gets its own DO instance keyed by "{tenantId}:{botId}".
[durable_objects]
bindings = [
  { name = "BOT_RUNTIME", class_name = "BotRuntimeDO" }
]

# Durable Object migrations must be applied with `wrangler deploy`.
# Cloudflare's managed build pipeline for this repo currently uses
# `wrangler versions upload`, which rejects migration operations.
# Existing production DO classes are already provisioned for this worker.

# ─── Environments ─────────────────────────────────────────────

[env.dev]
name = "beastbots-dev"
[env.dev.vars]
ENVIRONMENT = "development"

[env.staging]
name = "beastbots-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
