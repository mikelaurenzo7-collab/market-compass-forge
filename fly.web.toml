app = 'beastbots-web'
primary_region = 'ord'

[build]
  dockerfile = 'Dockerfile'

[build.settings]
  docker_target = 'web'

[env]
  NODE_ENV = 'production'
  NEXT_PUBLIC_API_URL = 'https://beastbots-api.fly.dev'
  INTERNAL_API_URL = 'https://beastbots-api.fly.dev'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "15s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
